name: Publish VPM Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package.json Version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Updating package.json version to $VERSION"
          python3 -c "
          import json
          with open('package.json', 'r') as f:
              pkg = json.load(f)
          pkg['version'] = '$VERSION'
          with open('package.json', 'w') as f:
              json.dump(pkg, f, indent=4, ensure_ascii=False)
          print(f'package.json version set to: {pkg[\"version\"]}')
          "
          cat package.json | head -5

      - name: Pack Package
        run: |
          zip -r "com.moruton.morutoon-${{ steps.version.outputs.VERSION }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".vscode/*" \
            -x "Tests/*" \
            -x "obj/*" \
            -x "docs/*" \
            -x "Documentation/*" \
            -x "*.meta"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum "com.moruton.morutoon-${{ steps.version.outputs.VERSION }}.zip" | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "com.moruton.morutoon-${{ steps.version.outputs.VERSION }}.zip"
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## MoruToon v${{ steps.version.outputs.VERSION }}

            ### Changes
            - See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

      - name: Update VPM Repository
        run: |
          python3 -c "
          import json, sys, os, urllib.request

          pkg_path = 'package.json'
          idx_path = 'docs/index.json'
          tag_version = '${{ steps.version.outputs.VERSION }}'
          repo_name = '${{ github.event.repository.name }}'
          vpm_url = f'https://moruton1119.github.io/{repo_name}/index.json'
          zip_url = f'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/com.moruton.morutoon-{tag_version}.zip'
          zip_sha256 = '${{ steps.sha.outputs.SHA256 }}'

          print(f'Updating {idx_path} with version {tag_version}...')
          print(f'zipSHA256: {zip_sha256}')

          # Load package.json
          with open(pkg_path, 'r') as f:
              pkg = json.load(f)
          pkg['version'] = tag_version

          # Try to load existing index.json from gh-pages
          idx = {}
          try:
              with urllib.request.urlopen(vpm_url) as response:
                  idx = json.loads(response.read().decode())
              print(f'Fetched existing index.json from {vpm_url}')
          except Exception as e:
              print(f'Could not fetch existing index.json: {e}. Using local if exists.')
              if os.path.exists(idx_path):
                  with open(idx_path, 'r') as f:
                      idx = json.load(f)

          # === Base metadata (lilToon/Poiyomi互換フォーマット) ===
          idx['name'] = 'MoruToon'
          idx['id'] = 'io.github.moruton1119.morutoon'
          idx['author'] = 'moruton1119'
          idx['url'] = vpm_url
          if 'packages' not in idx:
              idx['packages'] = {}

          name = pkg['name']

          # Ensure package structure exists
          if name not in idx['packages']:
              idx['packages'][name] = {'versions': {}}

          # === Version entry (lilToon/Poiyomi互換) ===
          version_entry = {
              'name': pkg['name'],
              'displayName': pkg.get('displayName', 'MoruToon'),
              'version': tag_version,
              'description': pkg.get('description', ''),
              'unity': pkg.get('unity', '2022.3'),
              'license': pkg.get('license', 'MIT'),
              'author': pkg.get('author', {'name': 'moruton1119'}),
              'keywords': pkg.get('keywords', []),
              'vpmDependencies': pkg.get('vpmDependencies', {}),
              'legacyFolders': pkg.get('legacyFolders', {}),
              'url': zip_url,
              'zipSHA256': zip_sha256,
              'changelogUrl': 'https://github.com/moruton1119/MoruToon/releases',
              'documentationUrl': 'https://github.com/moruton1119/MoruToon#readme',
              'licensesUrl': 'https://github.com/moruton1119/MoruToon/blob/main/LICENSE',
          }

          idx['packages'][name]['versions'][tag_version] = version_entry

          print(f'Adding package {name} version {tag_version}')

          # Save updated index.json
          os.makedirs(os.path.dirname(idx_path), exist_ok=True)
          with open(idx_path, 'w') as f:
              json.dump(idx, f, indent=4)

          print('Successfully updated docs/index.json')
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: true
